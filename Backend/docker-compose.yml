services:
  postgres2026:
    image: postgres:16-alpine
    container_name: postgres_db2026
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer2026:
    image: adminer
    container_name: adminer_ui2026
    restart: unless-stopped
    depends_on:
      postgres2026:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres2026
    ports:
      - "8090:8080"

volumes:
  postgres_data:
